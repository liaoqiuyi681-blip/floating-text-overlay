<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
<title id="title">Floating Text Overlay for Obsidian</title>
<desc id="desc">A dark product banner showing linked, movable notes floating over a Markdown document.</desc>
<defs>
  <linearGradient id="background" x1="0" y1="0" x2="1600" y2="700" gradientUnits="userSpaceOnUse">
    <stop stop-color="#0A1020"/><stop offset="0.5" stop-color="#11142D"/><stop offset="1" stop-color="#090B19"/>
  </linearGradient>
  <linearGradient id="violet" x1="35" y1="35" x2="210" y2="220" gradientUnits="userSpaceOnUse">
    <stop stop-color="#C4B5FD"/><stop offset="0.48" stop-color="#8B5CF6"/><stop offset="1" stop-color="#4F46E5"/>
  </linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#171A30"/><stop offset="1" stop-color="#0E1020"/></linearGradient>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="46"/></filter>
  <filter id="shadow" x="-20%" y="-30%" width="150%" height="170%"><feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#02030B" flood-opacity="0.65"/></filter>
  <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse"><path d="M46 0H0V46" fill="none" stroke="#A78BFA" stroke-opacity="0.075"/></pattern>
</defs>
<rect width="1600" height="700" fill="url(#background)"/>
<rect width="1600" height="700" fill="url(#grid)"/>
<ellipse cx="1320" cy="152" rx="330" ry="220" fill="#7C3AED" opacity="0.21" filter="url(#glow)"/>
<ellipse cx="400" cy="680" rx="420" ry="180" fill="#4338CA" opacity="0.13" filter="url(#glow)"/>

<!-- brand mark -->
<g transform="translate(92 90)">
  <rect width="112" height="112" rx="28" fill="url(#violet)"/>
  <path d="M35 29c0-5.8 4.7-10.5 10.5-10.5h27l21 21v42c0 5.8-4.7 10.5-10.5 10.5h-37.5C39.7 92 35 87.3 35 81.5V29Z" fill="#F9FAFF"/>
  <path d="M72.5 18.5V34c0 3.1 2.5 5.5 5.5 5.5h15.5" fill="#EDE9FE"/>
  <path d="M51 52h25M51 65h21M51 78h16" stroke="#7C3AED" stroke-width="4.8" stroke-linecap="round"/>
</g>
<text x="92" y="270" fill="#F8FAFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="760" font-size="64">Floating Text Overlay</text>
<text x="96" y="322" fill="#C7CBDF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25">Movable Markdown annotations that stay with your note.</text>
<text x="96" y="362" fill="#A7ABC3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Link text · Drag freely · Resize precisely · Scroll in sync</text>

<!-- chips -->
<g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">
  <g transform="translate(94 418)"><rect width="148" height="44" rx="22" fill="#1F2140" stroke="#6153B8"/><text x="24" y="28" fill="#DCD7FF">LINK TO TEXT</text></g>
  <g transform="translate(257 418)"><rect width="126" height="44" rx="22" fill="#1F2140" stroke="#6153B8"/><text x="24" y="28" fill="#DCD7FF">DRAG + DROP</text></g>
  <g transform="translate(398 418)"><rect width="156" height="44" rx="22" fill="#1F2140" stroke="#6153B8"/><text x="24" y="28" fill="#DCD7FF">SCROLL SYNC</text></g>
</g>
<text x="96" y="572" fill="#8E94AC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Built for Obsidian desktop · MIT licensed · Community plugin preparation</text>

<!-- mock Obsidian pane -->
<g transform="translate(805 70) rotate(2 350 280)" filter="url(#shadow)">
  <rect width="700" height="558" rx="24" fill="#101322" stroke="#353A63" stroke-width="2"/>
  <rect width="700" height="52" rx="24" fill="#171A2E"/>
  <circle cx="32" cy="26" r="6" fill="#F87171"/><circle cx="52" cy="26" r="6" fill="#FBBF24"/><circle cx="72" cy="26" r="6" fill="#34D399"/>
  <text x="110" y="32" fill="#9EA5C3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">project-ideas.md</text>
  <rect x="24" y="72" width="112" height="460" rx="12" fill="#15182B"/>
  <g fill="#707895"><rect x="44" y="105" width="58" height="8" rx="4"/><rect x="44" y="136" width="70" height="8" rx="4"/><rect x="44" y="167" width="48" height="8" rx="4"/><rect x="44" y="198" width="67" height="8" rx="4"/><rect x="44" y="229" width="54" height="8" rx="4"/></g>
  <rect x="156" y="72" width="520" height="460" rx="12" fill="#0E1020"/>
  <text x="196" y="128" fill="#F0F2FF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="29" font-weight="700"># Project Ideas</text>
  <text x="196" y="180" fill="#AEB4CE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">This note stays clean while annotations</text>
  <text x="196" y="211" fill="#AEB4CE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">float exactly where context matters.</text>
  <rect x="195" y="232" width="222" height="30" rx="6" fill="#3D2A69" opacity="0.75"/>
  <text x="204" y="253" fill="#F4DEFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Linked to important text</text>
  <text x="196" y="310" fill="#AEB4CE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Scroll the page: labels follow the content.</text>
  <text x="196" y="342" fill="#AEB4CE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Use the same workflow for research notes,</text>
  <text x="196" y="374" fill="#AEB4CE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">review, revision, and planning.</text>
  <!-- Floating note 1 -->
  <g transform="translate(423 176)">
    <rect width="226" height="145" rx="12" fill="#1C1730" stroke="#A78BFA" stroke-width="2"/>
    <rect width="226" height="32" rx="12" fill="#241B40"/>
    <text x="16" y="22" fill="#D8D4FF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">⠿  Floating text</text>
    <text x="199" y="22" fill="#D8D4FF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">×</text>
    <text x="17" y="61" fill="#F0EEFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Capture the decision</text>
    <text x="17" y="87" fill="#F0EEFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">without rewriting</text>
    <text x="17" y="113" fill="#F0EEFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">the note body.</text>
  </g>
  <!-- Floating note 2 -->
  <g transform="translate(390 365)">
    <rect width="236" height="120" rx="12" fill="#101B25" stroke="#67E8F9" stroke-width="2"/>
    <rect width="236" height="30" rx="12" fill="#15303C"/>
    <text x="16" y="21" fill="#CFFAFE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">⠿  Research cue</text>
    <text x="17" y="60" fill="#E6FDFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Click linked text to</text>
    <text x="17" y="85" fill="#E6FDFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">toggle this label.</text>
  </g>
</g>
</svg>
