<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">Linked text</title><desc id="desc">A linked text range which toggles an associated floating label.</desc>
<rect width="1200" height="720" rx="22" fill="#090B16"/>
<rect x="20" y="20" width="1160" height="680" rx="18" fill="#0E1120" stroke="#2D3150"/>
<rect x="20" y="20" width="1160" height="48" rx="18" fill="#171A2B"/>
<circle cx="48" cy="44" r="6" fill="#F87171"/><circle cx="68" cy="44" r="6" fill="#FBBF24"/><circle cx="88" cy="44" r="6" fill="#34D399"/>
<text x="120" y="50" fill="#A9B0CE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Obsidian · Linked text</text>
<rect x="44" y="88" width="134" height="584" rx="13" fill="#15182A"/>
<g fill="#6E7697"><rect x="67" y="128" width="70" height="9" rx="4"/><rect x="67" y="163" width="48" height="9" rx="4"/><rect x="67" y="198" width="78" height="9" rx="4"/><rect x="67" y="233" width="58" height="9" rx="4"/></g>
<rect x="195" y="88" width="961" height="584" rx="13" fill="#0B0E1B"/>
<text x="226" y="143" fill="#F8FAFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="31" font-weight="720"># Research Notes</text>
<text x="226" y="189" fill="#AEB5CD" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Floating Text Overlay keeps annotations close to the idea.</text>
<text x="226" y="309" fill="#AEB5CD" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">The source Markdown remains clean and readable.</text>
<text x="226" y="344" fill="#AEB5CD" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Use the label as an editable, draggable research cue.</text>
<rect x="202" y="236" width="390" height="33" rx="6" fill="#3B2A65"/><text x="210" y="258" fill="#F2E9FF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">This highlighted phrase is linked to a label.</text><path d="M202 273h390" stroke="#A78BFA" stroke-width="3"/><g transform="translate(645 178)"><rect width="330" height="172" rx="14" fill="#161B2E" stroke="#A78BFA" stroke-width="2"/><rect width="330" height="34" rx="14" fill="#24213F"/><text x="16" y="23" fill="#DDD6FE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">⠿  Linked</text><text x="20" y="76" fill="#F5F3FF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Ctrl/Cmd + click the</text><text x="20" y="108" fill="#F5F3FF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">source text to toggle.</text></g>
<rect x="44" y="627" width="1112" height="45" rx="12" fill="#11152A"/><text x="64" y="656" fill="#A7AFCE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Illustrative dark-theme preview — replace with a local Obsidian capture before release submission.</text>
</svg>